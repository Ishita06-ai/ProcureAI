name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Type-check ────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Next.js build (catches type + compile errors)
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: procureai_ci
          JWT_SECRET: ci-test-secret-not-used-in-prod
          AI_PROVIDER: mock
          STORAGE_PROVIDER: mock
          EMAIL_PROVIDER: mock
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
        run: npm run build

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: procureai_ci
          JWT_SECRET: ci-test-secret-not-used-in-prod
          AI_PROVIDER: mock
          STORAGE_PROVIDER: mock
          EMAIL_PROVIDER: mock
        run: npm test --if-present

  # ── Docker build check ───────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          build-args: |
            NEXT_PUBLIC_BASE_URL=http://localhost:3000
          cache-from: type=gha
          cache-to: type=gha,mode=max